# Netlify configuration for menendezmorro.com
# See BUILD_SPEC.md §3 (tech stack) and §11 (deployment plan).
# `npm run build` assembles the publish tree at public/ from src/, assets/,
# and content/ (see scripts/build.js). Redirects live in public/_redirects.

[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Basic security headers. A Content-Security-Policy header is intentionally
# deferred to Phase 11/12, once we know the exact origins Decap CMS and
# Google Analytics need to talk to.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
