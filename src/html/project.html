<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">

    <title>{{siteTitle}}</title>
    <meta name="description" content="{{siteDescription}}">
    <link rel="canonical" href="{{siteUrl}}/">

    <meta property="og:type" content="article">
    <meta property="og:title" content="{{siteTitle}}">
    <meta property="og:description" content="{{siteDescription}}">
    <meta property="og:url" content="{{siteUrl}}/">
    <meta property="og:image" content="{{siteUrl}}/{{ogImage}}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{siteTitle}}">
    <meta name="twitter:description" content="{{siteDescription}}">
    <meta name="twitter:image" content="{{siteUrl}}/{{ogImage}}">

    <link rel="icon" href="/assets/favicon.png" sizes="256x256">
    <link rel="preload" href="/assets/fonts/Geist-Regular.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/project.css">
    <link rel="stylesheet" href="/css/fullscreen.css">
    <link rel="stylesheet" href="/css/responsive.css">

    {{siteDataScript}}
    <script type="module" src="/js/main.js"></script>
  </head>
  <body class="project-page surface-description">
    <div class="project-shell" data-project-shell>
      <section class="section-gallery" data-section-gallery>
        <div class="gallery" data-gallery aria-label="Project gallery">
          <div class="gallery-track" data-gallery-track></div>
          <button class="gallery-arrow gallery-arrow-prev" data-gallery-prev type="button" aria-label="Previous image" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M15 4l-8 8 8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="gallery-arrow gallery-arrow-next" data-gallery-next type="button" aria-label="Next image" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M9 4l8 8-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </section>

      <section class="section-description" data-section-description aria-hidden="true">
        <div class="description-content" data-description-content></div>
      </section>
    </div>

    <header class="site-header">
      <a class="site-logo" href="/" data-nav-home aria-label="Back to home — MENÉNDEZ MORRO">MENÉNDEZ MORRO</a>
    </header>

    <a class="static-get-in-touch" href="#" data-action-copy-email aria-label="Copy email address to clipboard">
      <span class="dot" aria-hidden="true"></span>
      <span class="label">Get in touch</span>
    </a>

    <dl class="static-info-row" aria-label="Project info">
      <div class="info-cell" data-info-cell="links">
        <dt>LINKS</dt>
        <dd data-info-links></dd>
      </div>
      <div class="info-cell" data-info-cell="duration">
        <dt>DURATION</dt>
        <dd data-info-duration></dd>
      </div>
      <div class="info-cell" data-info-cell="cost">
        <dt>COST</dt>
        <dd data-info-cost></dd>
      </div>
    </dl>

    <a class="static-back-arrow" href="/" data-nav-home aria-label="Back to home">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M6 6L18 18M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </a>

    <div class="toast" data-toast hidden role="status" aria-live="polite">
      <span data-toast-message></span>
    </div>

    <div class="fullscreen-stage" data-fullscreen-stage hidden role="dialog" aria-modal="true" aria-label="Image preview">
      <div class="fullscreen-media" data-fullscreen-media></div>
      <p class="fullscreen-caption" data-fullscreen-caption hidden></p>
      <button class="fullscreen-close" data-fullscreen-close type="button" aria-label="Close preview">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <noscript>
      <div class="noscript-notice">
        This site needs JavaScript to render its gallery and navigation. Please enable JS or switch to a modern browser.
      </div>
    </noscript>
  </body>
</html>
